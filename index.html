<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paldo Global Product Guide</title>
  <style>
    :root{
      --red:#cf2027;
      --red-dark:#b61b22;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --soft:#fafafa;
      --chip:#fef2f2;
      --navy:#111827;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:#fff;
      -webkit-text-size-adjust:100%;
      overflow-x:hidden;
    }

    img{
      display:block;
      max-width:100%;
    }

    .container{
      width:100%;
      max-width:1040px;
      margin:0 auto;
      padding:0 24px;
    }

    header{
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .logo-wrap{
      padding:30px 0;
      text-align:center;
    }

    .logo-wrap img{
      height:140px;
      width:auto;
      margin:0 auto;
    }

    .hero{
      background:linear-gradient(135deg,#fff7f7 0%, #fff 58%, #fff4f1 100%);
      border-bottom:1px solid var(--line);
    }

    .hero-inner{
      padding:40px 0 34px;
      text-align:center;
    }

    .eyebrow{
      color:var(--red);
      font-size:11px;
      font-weight:800;
      letter-spacing:.22em;
      text-transform:uppercase;
    }

    .hero h1{
      margin:14px 0 0;
      font-size:48px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .hero h1 span{
      display:block;
      color:#333;
    }

    .hero p{
      max-width:760px;
      margin:16px auto 0;
      color:var(--muted);
      font-size:16px;
      line-height:1.8;
    }

    .lang-wrap,
    .tabs-wrap{
      border-bottom:1px solid var(--line);
      background:#fff;
    }

    .lang-tabs,
    .tabs{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      padding:16px 0;
    }

    .lang-tab,
    .tab{
      border:1px solid #d1d5db;
      background:#fff;
      border-radius:999px;
      padding:11px 18px;
      font-size:14px;
      font-weight:800;
      color:#374151;
      cursor:pointer;
      white-space:nowrap;
    }

    .lang-tab.active,
    .tab.active{
      background:#111827;
      border-color:#111827;
      color:#fff;
    }

    .main{
      padding:40px 0 64px;
    }

    .top-grid{
      display:grid;
      grid-template-columns:420px minmax(0,1fr);
      gap:42px;
      align-items:center;
    }

    .image-box{
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg,#fafafa 0%, #f3f4f6 100%);
      padding:26px;
    }

    .image-frame{
      min-height:360px;
      border-radius:22px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .image-frame img{
      max-height:330px;
      max-width:100%;
      width:auto;
      height:auto;
      object-fit:contain;
    }

    .text-area{
      padding-left:4px;
      padding-right:4px;
      min-width:0;
    }

    .title{
      margin:0;
      font-size:52px;
      line-height:1.02;
      font-weight:900;
      letter-spacing:-.05em;
      word-break:keep-all;
      overflow-wrap:break-word;
    }

    .subtitle{
      margin:14px 0 0;
      color:var(--muted);
      font-size:19px;
      line-height:1.6;
      word-break:keep-all;
    }

    .desc-title{
      margin:26px 0 0;
      font-size:11px;
      font-weight:800;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:#9ca3af;
    }

    .desc{
      margin-top:14px;
      font-size:17px;
      line-height:1.85;
      color:#374151;
    }

    .desc p{
      margin:0 0 8px;
    }

    .section{
      margin-top:46px;
    }

    .section h2{
      margin:0;
      font-size:30px;
      line-height:1.1;
      font-weight:900;
      letter-spacing:-.03em;
      word-break:keep-all;
    }

    .ingredient-list{
      margin-top:18px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      padding:6px 0 2px;
    }

    .ingredient{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      color:#374151;
    }

    .nutrition-grid{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .nutrition-box{
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      background:#fff;
      min-width:0;
    }

    .nutrition-box .label{
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#9ca3af;
    }

    .nutrition-box .value{
      margin-top:8px;
      font-size:18px;
      font-weight:900;
      line-height:1.4;
      word-break:break-word;
    }

    .allergen-box{
      margin-top:18px;
      border:1px solid #fecaca;
      background:var(--chip);
      border-radius:22px;
      padding:18px;
    }

    .allergen-title{
      color:#b91c1c;
      font-size:14px;
      font-weight:800;
    }

    .chips{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .chip{
      border:1px solid #fecaca;
      background:#fff;
      color:#b91c1c;
      border-radius:999px;
      padding:8px 12px;
      font-size:14px;
      font-weight:800;
    }

    .cook-box{
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:22px;
      padding:20px;
      background:#fff;
    }

    .cook-subtitle{
      font-size:16px;
      font-weight:900;
      line-height:1.5;
    }

    .steps{
      list-style:none;
      margin:14px 0 0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .steps li{
      display:flex;
      gap:12px;
      align-items:flex-start;
      color:#374151;
      line-height:1.8;
    }

    .num{
      width:28px;
      height:28px;
      border-radius:999px;
      background:#111827;
      color:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:900;
      flex:0 0 auto;
      margin-top:2px;
    }

    @media (max-width:900px){
      .top-grid{
        grid-template-columns:1fr;
        gap:28px;
      }

      .nutrition-grid{
        grid-template-columns:repeat(2,1fr);
      }

      .title{
        font-size:40px;
      }

      .hero h1{
        font-size:38px;
      }

      .logo-wrap img{
        height:110px;
      }
    }

    @media (max-width:640px){
      .container{
        padding:0 20px;
      }

      .logo-wrap{
        padding:20px 0;
      }

      .logo-wrap img{
        height:72px;
      }

      .hero-inner{
        padding:28px 0 24px;
      }

      .hero h1{
        font-size:30px;
        line-height:1.12;
      }

      .hero p{
        font-size:14px;
        line-height:1.7;
        margin-top:14px;
      }

      .lang-tabs,
      .tabs{
        justify-content:flex-start;
        flex-wrap:nowrap;
        overflow-x:auto;
        gap:8px;
        padding:14px 0;
        scrollbar-width:none;
      }

      .lang-tabs::-webkit-scrollbar,
      .tabs::-webkit-scrollbar{
        display:none;
      }

      .lang-tab,
      .tab{
        flex:0 0 auto;
        padding:10px 14px;
        font-size:13px;
      }

      .main{
        padding:28px 0 48px;
      }

      .top-grid{
        grid-template-columns:1fr;
        gap:22px;
      }

      .image-box{
        padding:16px;
        border-radius:20px;
      }

      .image-frame{
        min-height:240px;
        border-radius:16px;
      }

      .image-frame img{
        max-height:220px;
        max-width:100%;
        height:auto;
      }

      .text-area{
        padding-left:12px;
        padding-right:12px;
      }

      .title{
        font-size:28px;
        line-height:1.12;
        margin:0;
      }

      .subtitle{
        font-size:15px;
        line-height:1.7;
        margin-top:10px;
      }

      .desc-title{
        margin-top:22px;
        font-size:10px;
        letter-spacing:.18em;
      }

      .desc{
        font-size:15px;
        line-height:1.75;
      }

      .section{
        margin-top:34px;
      }

      .section h2{
        font-size:24px;
        line-height:1.15;
        padding-left:12px;
        padding-right:12px;
      }

      .ingredient-list{
        margin-top:16px;
        gap:10px;
        padding:4px 12px 0;
      }

      .ingredient{
        font-size:13px;
        padding:8px 12px;
      }

      .nutrition-grid{
        grid-template-columns:1fr;
        gap:12px;
        padding:0 12px;
      }

      .nutrition-box{
        padding:14px;
      }

      .nutrition-box .value{
        font-size:17px;
      }

      .allergen-box{
        margin-left:12px;
        margin-right:12px;
        padding:16px;
        border-radius:18px;
      }

      .chip{
        font-size:13px;
        padding:7px 10px;
      }

      .cook-box{
        margin-left:12px;
        margin-right:12px;
        padding:16px;
        border-radius:18px;
      }

      .steps li{
        gap:10px;
        line-height:1.65;
        font-size:14px;
      }

      .num{
        width:24px;
        height:24px;
        font-size:12px;
      }
    }
  </style>
</head>

    function renderImage(src, alt){
      imageFrame.innerHTML = "";

      const img = document.createElement("img");
      img.src = src;
      img.alt = alt;

      img.onerror = () => {
        imageFrame.innerHTML = `
          <div style="text-align:center;color:#6b7280;padding:12px;">
            <div style="display:inline-block;padding:8px 14px;border-radius:999px;border:1px solid #e5e7eb;background:#fff;font-size:12px;font-weight:800;letter-spacing:.18em;">
              ${uiText[activeLang].productImage}
            </div>
            <div style="margin-top:18px;font-size:28px;font-weight:900;color:#111827;line-height:1.3;">
              ${alt}
            </div>
          </div>
        `;
      };

      imageFrame.appendChild(img);
    }

    function renderLangTabs(){
      langTabs.innerHTML = "";
      Object.keys(uiText).forEach((lang) => {
        const btn = document.createElement("button");
        btn.className = "lang-tab" + (lang === activeLang ? " active" : "");
        btn.textContent = uiText[lang].langName;
        btn.onclick = () => {
          activeLang = lang;
          render();
        };
        langTabs.appendChild(btn);
      });
    }

    function renderTabs(){
      tabs.innerHTML = "";
      products.forEach((p) => {
        const localized = p.content[activeLang] || p.content.en;
        const btn = document.createElement("button");
        btn.className = "tab" + (p.id === activeId ? " active" : "");
        btn.textContent = localized.name;
        btn.onclick = () => {
          activeId = p.id;
          render();
        };
        tabs.appendChild(btn);
      });
    }

    function renderUI(){
      const t = uiText[activeLang];
      eyebrowEl.textContent = t.eyebrow;
      heroTitleEl.innerHTML = t.heroTitle;
      heroDescEl.textContent = t.heroDesc;
      descTitleEl.textContent = t.descTitle;
      ingredientsTitleEl.textContent = t.ingredientsTitle;
      nutritionTitleEl.textContent = t.nutritionTitle;
      allergyTitleEl.textContent = t.allergyTitle;
      containsTitleEl.textContent = t.containsTitle;
      cookSectionTitleEl.textContent = t.cookingTitle;
      document.documentElement.lang = activeLang;
    }

    function render(){
      const product = products.find(item => item.id === activeId) || products[0];
      const p = product.content[activeLang] || product.content.en;
      const nl = nutritionLabels[activeLang] || nutritionLabels.en;

      renderLangTabs();
      renderTabs();
      renderUI();
      renderImage(product.image, p.name);

      nameEl.textContent = p.name;
      subtitleEl.textContent = p.subtitle;
      descEl.innerHTML = p.description.map(d => `<p>${d}</p>`).join("");

      ingredientsEl.innerHTML = p.ingredients
        .map(i => `<span class="ingredient">${i}</span>`)
        .join("");

      nutritionEl.innerHTML = p.nutrition
        .map(n => `
          <div class="nutrition-box">
            <div class="label">${nl[n.labelKey]}</div>
            <div class="value">${n.value}</div>
          </div>
        `)
        .join("");

      allergensEl.innerHTML = p.allergens
        .map(a => `<span class="chip">${a}</span>`)
        .join("");

      cookTitleEl.textContent = p.cookTitle;

      stepsEl.innerHTML = p.steps
        .map((s, i) => `
          <li>
            <span class="num">${i + 1}</span>
            <span>${s}</span>
          </li>
        `)
        .join("");
    }

    render();
